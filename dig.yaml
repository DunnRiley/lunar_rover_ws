mission:
  name: "Excavation run DIG"
  steps:
  # Skimming pose
  - action: actuator_position
    params:
      target: dig2
      timeout_s: 8
  # Digging
  - action: drive_backward
    params:
      distance_m: 0.25
      use_camera: false
      timeout_s: 15
  # Deeper dig
  - action: actuator_position
    params:
      target: dig1
      timeout_s: 8
  # Digging
  - action: drive_backward
    params:
      distance_m: 1.0
      use_camera: false
      timeout_s: 15
  # Skimming pose
  - action: actuator_position
    params:
      target: dig2
      timeout_s: 8
  # Diggging 
  - action: drive_backward
    params:
      distance_m: 0.5
      use_camera: false
      timeout_s: 15
  # Set pose to drive
  - action: actuator_position
    params:
      target: drive
      timeout_s: 8
  # Leave area
  - action: drive_forward
    params:
      distance_m: 1.0
      use_camera: false
      timeout_s: 15
  # End
  - action: stop
