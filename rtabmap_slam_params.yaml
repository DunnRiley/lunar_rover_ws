rtabmap:
  ros__parameters:
    # Frame Configuration
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"
    
    # Topic Subscription
    subscribe_depth: true
    subscribe_rgb: true
    subscribe_odom_info: false  # Don't wait for odom_info (causes warnings)
    approx_sync: true
    wait_for_transform: 1.0
    queue_size: 50
    topic_queue_size: 50
    
    # Database
    database_path: "~/.ros/rtabmap.db"
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    
    # Mapping Rate
    Rtabmap/DetectionRate: "1.0"  # Process 1 frame per second
    RGBD/LinearUpdate: "0.1"      # Update every 10cm
    RGBD/AngularUpdate: "0.1"     # Update every ~6 degrees
    
    # Feature Detection - MUST MATCH ODOMETRY!
    Vis/FeatureType: "0"  # 0=GFTT (MUST MATCH odometry)
    Kp/DetectorStrategy: "0"  # 0=GFTT
    GFTT/MinDistance: "5"
    GFTT/QualityLevel: "0.001"
    
    # Feature Matching
    Vis/MinInliers: "10"
    Vis/MaxFeatures: "1000"
    Kp/MaxFeatures: "1000"
    Vis/MaxDepth: "4.0"
    
    # Grid Map Generation (for navigation)
    Grid/FromDepth: "true"
    Grid/MaxObstacleHeight: "0.5"
    Grid/MinObstacleHeight: "0.05"
    Grid/RangeMax: "5.0"
    Grid/CellSize: "0.05"
    Grid/DepthDecimation: "4"
    Grid/3D: "false"  # 2D occupancy grid
    
    # Registration (ICP for scan matching)
    Reg/Strategy: "1"  # ICP
    Reg/Force3DoF: "true"  # 2D SLAM (x, y, yaw only)
    Icp/VoxelSize: "0.05"
    Icp/MaxTranslation: "0.2"
    Icp/MaxCorrespondenceDistance: "0.1"
    Icp/Iterations: "30"
    Icp/Epsilon: "0.001"
    
    # Loop Closure
    RGBD/OptimizeFromGraphEnd: "false"
    RGBD/ProximityBySpace: "true"
    RGBD/ProximityMaxGraphDepth: "50"
    RGBD/NeighborLinkRefining: "true"
    
    # Memory Management
    Mem/NotLinkedNodesKept: "false"
    Mem/STMSize: "30"
    Rtabmap/TimeThr: "0"  # No time limit
    
    # Visualization
    RGBD/SavedLocalizationIgnored: "false"
    RGBD/CreateOccupancyGrid: "true"