mission:
  name: Excavation run DIG
  steps:
  - action: actuator_position
    params:
      target: dig2
      timeout_s: 8
  - action: drive_backward
    params:
      distance_m: 0.25
      use_camera: false
      timeout_s: 15
  - action: actuator_position
    params:
      target: dig1
      timeout_s: 8
  - action: drive_backward
    params:
      distance_m: 1.0
      use_camera: false
      timeout_s: 15
  - action: actuator_position
    params:
      target: drive
      timeout_s: 8
  - action: stop
    params: {}
