motor_controller:
  ros__parameters:
    # Motor port mappings (adjust to match your setup)
    fr_port: '/dev/ttyUSB0'  # Front Right
    fl_port: '/dev/ttyUSB1'  # Front Left
    br_port: '/dev/ttyUSB2'  # Back Right
    bl_port: '/dev/ttyUSB3'  # Back Left
    
    # Serial communication
    baudrate: 9600
    
    # Safety parameters
    cmd_vel_timeout: 0.5      # Stop if no cmd_vel (seconds)
    deadzone_linear: 0.05     # Ignore small commands
    deadzone_angular: 0.05
    watchdog_rate: 10.0       # Hz
    
    use_sim_time: false       # CRITICAL: false for real hardware