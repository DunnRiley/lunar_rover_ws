rgbd_odometry:
  ros__parameters:
    # Frame Configuration
    frame_id: "base_link"
    odom_frame_id: "odom"
    publish_tf: true
    
    # Topic Synchronization
    subscribe_depth: true
    subscribe_rgb: true
    approx_sync: true
    approx_sync_max_interval: 0.5
    wait_for_transform: 1.0
    queue_size: 30
    
    # Odometry Strategy
    Odom/Strategy: "0"  # Frame-to-Map (F2M) = 0, Frame-to-Frame (F2F) = 1
    Odom/ResetCountdown: "1"
    Odom/GuessMotion: "false"
    
    # Feature Detection - GFTT (Good Features To Track)
    # CRITICAL: Must match RTAB-Map detector!
    Vis/FeatureType: "0"  # 0=GFTT, 6=GFTT+ORB
    GFTT/MinDistance: "5"
    GFTT/QualityLevel: "0.001"
    
    # Feature Matching
    Vis/MinInliers: "10"
    Vis/MaxFeatures: "1000"
    Vis/MaxDepth: "4.0"
    Vis/CorType: "0"  # Features Matching
    
    # Performance
    Vis/CorGuessWinSize: "20"
    Vis/CorNNType: "3"  # kNNBruteForce
    
    # 3D Parameters
    Vis/EstimationType: "1"  # 3D->3D
    Vis/ForwardEstOnly: "false"
    Vis/RefineIterations: "5"